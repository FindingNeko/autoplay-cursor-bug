<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chromium OOPIF Cursor Bug</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; padding-top: 50px; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
        #iframe-container { 
            margin-top: 30px; height: 500px; width: 800px; 
            margin-left: auto; margin-right: auto; 
            border: 2px dashed #555; display: none; 
        }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <h1>Chromium OOPIF Cursor Sync Bug</h1>
    <p>This demonstrates the cursor sync failure across process boundaries during media playback.</p>
    
    <button id="startBtn" onclick="runTest()">Start Test</button>
    <h3 id="status" style="color: #ff4444; display: none;">HANDS OFF THE MOUSE! Injecting Cross-Origin Iframe...</h3>
    
    <div id="iframe-container">
        <iframe id="testFrame" src="https://codepen.io/FindingNeko/full/VYKQeNV" allow="autoplay"></iframe>
    </div>

    <script>
        function runTest() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('status').style.display = 'block';
            
            // Wait 2 seconds so the user can physically let go of the mouse
            setTimeout(() => {
                // Inject the iframe into the page
                document.getElementById('iframe-container').style.display = 'block';
            }, 2000);
        }
    </script>
</body>
</html>
