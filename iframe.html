<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Embedded Player</title>
    <style>
        /* Force the cursor invisible */
        * { cursor: none !important; }
        body { 
            background: #111; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            color: white;
            font-family: monospace;
        }
        /* Disabling pointer events stops the default browser controls from showing their own cursor */
        video { pointer-events: none; width: 80%; border: 1px solid #444; }
    </style>
</head>
<body>
    <div>
        <h2>Iframe Player Loaded</h2>
        <video src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" autoplay></video>
    </div>
</body>
</html>
